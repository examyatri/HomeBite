<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Home Bite – Rider</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --p:#e63946;--pd:#c1121f;
  --g:#2a9d8f;--gl:#e8f5f3;
  --o:#f4a261;--y:#ffd166;
  --bg:#0a0f1e;--card:#131929;--card2:#1c2540;
  --tx:#e8eaf6;--mu:#4a5568;
  --sh:0 8px 32px rgba(0,0,0,.4);--r:16px;
  --ff:'Sora',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh}
.hide{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;font-family:var(--ff);font-weight:700;font-size:13px;border:none;cursor:pointer;transition:all .18s}
.btn:active{transform:scale(.95)}
.btn-p{background:var(--p);color:#fff;box-shadow:0 4px 16px rgba(230,57,70,.4)}
.btn-g{background:var(--g);color:#fff}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--tx)}
.btn-sm{padding:8px 13px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.08);border-radius:12px;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--tx);outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--p);background:rgba(255,255,255,.09)}
.inp::placeholder{color:var(--mu)}
.pw-wrap{position:relative}
.pw-wrap .inp{padding-right:46px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mu);font-size:15px;padding:4px;touch-action:manipulation}
.creds-hint{font-size:11px;font-weight:700;color:#4ecdc4;margin-bottom:10px;padding:7px 12px;background:rgba(42,157,143,.15);border-radius:9px;display:none}
.creds-hint.show{display:block}
.bdg{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-g{background:rgba(42,157,143,.2);color:#4ecdc4}.b-o{background:rgba(244,162,97,.2);color:var(--o)}
.b-y{background:rgba(255,209,102,.2);color:var(--y)}.b-r{background:rgba(230,57,70,.2);color:#ff6b81}
.b-bl{background:rgba(100,150,255,.2);color:#80aaff}
.spin{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(255,255,255,.95);color:var(--bg);padding:12px 22px;border-radius:30px;font-weight:700;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;font-family:var(--ff)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── AUTH ── */
#pg-auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px}
.a-logo{text-align:center;margin-bottom:36px}
.a-em{font-size:60px;display:block;margin-bottom:12px}
.a-logo h1{font-family:var(--ff);font-size:26px;font-weight:800;color:var(--p)}
.a-logo p{color:var(--mu);font-size:13px;font-weight:500;margin-top:4px}
.a-card{background:var(--card);border-radius:22px;padding:26px 22px;width:100%;box-shadow:var(--sh)}
.fg{margin-bottom:13px}
.lbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}

/* ── APP ── */
#pg-app{display:none;padding-bottom:24px}
.rider-nav{background:var(--card);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,.05)}
.r-info h3{font-family:var(--ff);font-size:16px;font-weight:800}
.r-info p{font-size:11px;color:var(--mu);margin-top:2px}
.dot{display:inline-block;width:7px;height:7px;background:#4ecdc4;border-radius:50%;margin-right:5px;box-shadow:0 0 0 3px rgba(78,205,196,.25);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(78,205,196,.25)}50%{box-shadow:0 0 0 7px rgba(78,205,196,.08)}}

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:14px 14px 6px}
.sp{flex:1;background:var(--card);border-radius:14px;padding:13px 10px;text-align:center}
.sp .n{font-family:var(--ff);font-size:22px;font-weight:800}
.sp .l{font-size:11px;color:var(--mu);margin-top:2px}

/* ── ORDERS ── */
.ord-hdr{padding:14px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ord-hdr h3{font-family:var(--ff);font-size:18px;font-weight:800}
.ord-count-badge{font-size:11px;color:var(--mu);font-weight:600;background:rgba(255,255,255,.07);padding:3px 9px;border-radius:10px}
.o-card{background:var(--card);border-radius:var(--r);margin:0 14px 14px;overflow:hidden;box-shadow:var(--sh);border:1px solid rgba(255,255,255,.04)}
.o-top{padding:14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:flex-start}
.o-id{font-family:var(--ff);font-size:13px;font-weight:700}
.o-dt{font-size:11px;color:var(--mu);margin-top:3px}
.o-type-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:4px;display:inline-block}
.tag-day{background:rgba(255,209,102,.15);color:var(--y)}
.tag-night{background:rgba(100,150,255,.15);color:#80aaff}
.cust{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.cust-nm{font-family:var(--ff);font-size:16px;font-weight:800;margin-bottom:8px}
.cust-addr{font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.5}
.act-row{display:flex;gap:7px}
.a-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;border:none;text-decoration:none;font-family:var(--ff)}
.call{background:rgba(42,157,143,.2);color:#4ecdc4}
.maps{background:rgba(100,150,255,.2);color:#80aaff}
.wa{background:rgba(37,211,102,.2);color:#25d366}
.items-sec{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.items-sec h5{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.irow{display:flex;justify-content:space-between;font-size:13px;font-weight:600;padding:3px 0}
.irow .pr{color:var(--mu)}
.amt-sec{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center}
.amt-lbl{font-size:12px;color:var(--mu)}
.amt-val{font-family:var(--ff);font-size:20px;font-weight:800;color:var(--p)}
.act-sec{padding:13px 14px;display:flex;gap:8px}
.st-sel{flex:1;padding:10px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:10px;color:var(--tx);font-family:var(--ff);font-weight:700;font-size:13px;outline:none;-webkit-appearance:none}
.st-sel option{background:#1c2540;color:var(--tx)}
.upd-btn{padding:10px 18px;background:var(--p);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;font-family:var(--ff)}
.pdf-btn{padding:10px 13px;background:rgba(255,255,255,.08);color:var(--tx);border:none;border-radius:10px;font-size:13px;cursor:pointer}
.empty{text-align:center;padding:56px 20px;color:var(--mu)}
.empty span{font-size:54px;display:block;margin-bottom:14px}
.empty p{font-weight:600;font-size:15px}

/* ── FILTERS ── */
.filter-section{background:var(--card2);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 14px}
.filter-section-title{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.f-label{font-size:11px;font-weight:700;color:var(--mu);white-space:nowrap;min-width:42px}
.f-select,.f-date{flex:1;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:10px;color:var(--tx);font-family:var(--fb);font-weight:600;font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none}
.f-select:focus,.f-date:focus{border-color:var(--p)}
.f-select option{background:#1c2540;color:var(--tx)}
.filter-actions{display:flex;gap:8px;margin-top:10px}
.f-apply{flex:1;background:var(--p);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--ff);display:flex;align-items:center;justify-content:center;gap:6px}
.f-reset{background:rgba(255,255,255,.08);color:var(--tx);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--ff)}
.active-filter-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(230,57,70,.15);color:#ff8a93;border:1px solid rgba(230,57,70,.25);border-radius:8px;font-size:11px;font-weight:700;padding:3px 8px;margin-top:8px;flex-wrap:wrap}
.active-filter-tag span{font-weight:800}

/* PDF PRINT */
@media print{
  #pg-auth,#pg-app,.toast{display:none!important}
  #print-content{display:block!important}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="pg-auth">
  <div class="a-logo">
    <span class="a-em">🏍️</span>
    <h1>Home Bite Rider</h1>
    <p>Delivery Partner Portal</p>
  </div>
  <div class="a-card">
    <div class="fg"><label class="lbl">Rider Email</label><input id="r-em" class="inp" type="email" placeholder="rider@email.com"></div>
    <div id="rider-creds-hint" class="creds-hint">✅ Credentials filled from last session</div>
    <div class="fg"><label class="lbl">Password</label><div class="pw-wrap"><input id="r-pw" class="inp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"><button type="button" class="pw-eye" onclick="togglePw('r-pw',this)" tabindex="-1"><i class="fa-solid fa-eye"></i></button></div></div>
    <button class="btn btn-p btn-full" id="login-btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Login & Start Delivery</button>
  </div>
</div>

<!-- APP -->
<div id="pg-app">
  <nav class="rider-nav">
    <div class="r-info">
      <h3 id="r-name">Rider</h3>
      <p><span class="dot"></span>Online · Ready for delivery</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <!-- STATS (always shows total for all orders) -->
  <div class="stats">
    <div class="sp"><div class="n" id="s-total" style="color:var(--o)">0</div><div class="l">Total</div></div>
    <div class="sp"><div class="n" id="s-pend" style="color:var(--y)">0</div><div class="l">Pending</div></div>
    <div class="sp"><div class="n" id="s-done" style="color:#4ecdc4">0</div><div class="l">Delivered</div></div>
  </div>

  <!-- ── TWO-LEVEL FILTER SECTION ── -->
  <div class="filter-section">
    <div class="filter-section-title"><i class="fa-solid fa-filter"></i> Filter Orders</div>

    <!-- Level 1: Date filter -->
    <div class="filter-row">
      <span class="f-label">📅 Date</span>
      <input type="date" class="f-date" id="filter-date" onchange="applyFilters()">
      <button class="f-reset" onclick="clearDate()" title="Clear date" style="padding:9px 11px">✕</button>
    </div>

    <!-- Level 2: Day / Night + Status -->
    <div class="filter-row">
      <span class="f-label">🕐 Slot</span>
      <select class="f-select" id="filter-type" onchange="applyFilters()">
        <option value="all">All Slots</option>
        <option value="day">☀️ Day (Morning, before 11:30 AM)</option>
        <option value="night">🌙 Night (Evening, 11:30 AM+)</option>
      </select>
    </div>

    <div class="filter-row">
      <span class="f-label">📋 Status</span>
      <select class="f-select" id="filter-status" onchange="applyFilters()">
        <option value="all">All Status</option>
        <option value="active">Active (not delivered)</option>
        <option value="pending">Pending</option>
        <option value="preparing">Preparing</option>
        <option value="out for delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
      </select>
    </div>

    <!-- Active filter tags & actions -->
    <div id="active-filter-tags"></div>
    <div class="filter-actions">
      <button class="f-apply" onclick="applyFilters()"><i class="fa-solid fa-filter"></i> Apply Filter</button>
      <button class="f-reset" onclick="resetFilters()"><i class="fa-solid fa-xmark"></i> Reset</button>
    </div>
  </div>

  <div class="ord-hdr">
    <h3>Deliveries <span class="ord-count-badge" id="ord-count-badge"></span></h3>
    <button class="btn btn-ghost btn-sm" onclick="loadOrders()"><i class="fa-solid fa-rotate"></i> Refresh</button>
  </div>

  <div id="orders-con">
    <div class="empty"><span>⏳</span><p>Loading orders...</p></div>
  </div>
</div>

<!-- Hidden print area -->
<div id="print-content" style="display:none"></div>

<div class="toast" id="toast"></div>
<script>
const CFG={
  GAS:'https://script.google.com/macros/s/AKfycbwHq-D_E4_aD2W3R9TmaTk39pW87El0UCN89Vrjx4lUUhWRnMJbcsuUZLt1trwjkAq8Yg/exec',
  KEY:'HB_SECURE_API_KEY_2026'
};

async function api(action,data={}){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),20000);
  try{
    const r=await fetch(CFG.GAS,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,data,apiKey:CFG.KEY}),signal:ctrl.signal});
    clearTimeout(timer);
    const res=await r.json();
    if(!res.success) throw new Error(res.error||'API error');
    return res.data;
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError') throw new Error('Request timed out. Please retry.');
    throw e;
  }
}

// ── AUTH — Credentials-only localStorage, session in-memory ──
// Only email+password saved for autofill. Rider data loaded fresh from sheet.
let _rider=null;

// Password show/hide toggle
function togglePw(inputId,btn){
  const inp=doc(inputId), icon=btn.querySelector('i');
  if(!inp) return;
  if(inp.type==='password'){ inp.type='text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
  else{ inp.type='password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}

// WhatsApp opener — works from any app (WhatsApp, Telegram, Chrome)
function openWA(phone,encodedMsg){
  const url='https://wa.me/'+phone+(encodedMsg?'?text='+encodedMsg:'');
  try{
    const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }catch(e){ window.open(url,'_blank'); }
}

// Rider credentials store — ONLY email+password
const RCreds={
  save:(em,pw)=>{ try{ localStorage.setItem('hb_rider_creds',JSON.stringify({em,pw})); }catch{} },
  get:()=>{ try{ return JSON.parse(localStorage.getItem('hb_rider_creds')); }catch{ return null; } },
  clear:()=>{ try{ localStorage.removeItem('hb_rider_creds'); }catch{} }
};

function autofillRiderCreds(){
  const c=RCreds.get();
  if(c&&c.em&&c.pw){
    try{
      doc('r-em').value=c.em;
      doc('r-pw').value=c.pw;
      const hint=doc('rider-creds-hint');
      if(hint) hint.classList.add('show');
    }catch{}
  }
}

async function doLogin(){
  const em=doc('r-em').value.trim(), pw=doc('r-pw').value;
  if(!em||!pw) return toast('Email aur password daalein');
  const btn=doc('login-btn');
  btn.innerHTML='<span class="spin"></span> Logging in...'; btn.disabled=true;
  try{
    // Always verify+load from sheet
    _rider=await api('riderLogin',{email:em,password:pw});
    // Save ONLY credentials for autofill
    RCreds.save(em,pw);
    showApp();
  }catch(e){ toast('❌ '+e.message); }
  finally{ btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login & Start Delivery'; btn.disabled=false; }
}

function doLogout(){
  if(!confirm('Logout?')) return;
  // Clear session — NOT credentials (keep for autofill)
  _rider=null;
  doc('pg-app').style.display='none';
  doc('pg-auth').style.display='flex';
  autofillRiderCreds();
}

function showApp(){
  doc('pg-auth').style.display='none';
  doc('pg-app').style.display='block';
  doc('r-name').textContent='Hello, '+(_rider.name||'Rider');
  loadOrders();
}

// ── ORDERS ──
let _orders=[];
let _filteredOrders=[];

async function loadOrders(){
  if(!_rider) return;
  doc('orders-con').innerHTML='<div class="empty"><span>⏳</span><p>Loading...</p></div>';
  try{
    _orders=await api('getRiderOrders',{riderId:_rider.riderId});
    applyFilters();
  }catch(e){ toast('❌ '+e.message); }
}

// ══════════════════════════════════════════════════
// TIME PARSING — determines if an order is Day or Night
// Day   = morning menu = order time before 11:30 AM (hour < 11.5)
// Night = evening menu = order time 11:30 AM onwards
// o.time examples: "10:30 am", "11:45 AM", "07:15 PM", "12:00 pm"
// ══════════════════════════════════════════════════
function getOrderHour(timeStr){
  if(!timeStr && timeStr !== 0) return -1;

  // Case 1: actual JS Date object
  if(timeStr instanceof Date){
    const ist=new Date(timeStr.getTime()+5.5*60*60*1000);
    return ist.getUTCHours() + ist.getUTCMinutes()/60;
  }

  const s=String(timeStr).replace(/[\u00a0\u202f\u2009\u200b]/g,' ').trim();

  // Case 2: ISO datetime string — Sheets time-only cells serialize as
  // "1899-12-30T04:30:00.000Z" (Excel epoch). Apply +5:30 to get IST hours.
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const ist=new Date(new Date(s).getTime()+5.5*60*60*1000);
    if(!isNaN(ist.getTime())) return ist.getUTCHours() + ist.getUTCMinutes()/60;
  }

  // Case 3: "HH:MM am/pm" string (normal stored text)
  const lower=s.toLowerCase();
  const match=lower.match(/(\d{1,2}):(\d{2})\s*(am|pm)?/);
  if(!match) return -1;
  let h=parseInt(match[1]);
  const m=parseInt(match[2]);
  const period=match[3]||'';
  if(period==='pm'&&h!==12) h+=12;
  if(period==='am'&&h===12) h=0;
  return h + m/60;
}

function isDayOrder(o){
  // Day order = morning slot = placed before 11:30 AM
  const h=getOrderHour(o.time);
  if(h<0) return true; // fallback: treat unknown as day
  return h < 11.5;
}

// ══════════════════════════════════════════════════
// DATE PARSING — converts any date format → "YYYY-MM-DD" for comparison
// Handles ALL cases that can come from the API:
//   1. JS Date object  (rare — only if parsed before JSON serialize)
//   2. ISO string      "2026-04-03T18:30:00.000Z"  ← what JSON actually sends
//   3. DD/MM/YYYY      "03/04/2026"                 ← en-IN locale string
//   4. YYYY-MM-DD      "2026-04-03"                 ← passthrough
// For ISO strings from Sheets: date cells stored as midnight UTC become
// e.g. "2026-04-02T18:30:00.000Z" which is 2026-04-03 IST (+5:30)
// We apply the +5:30 offset to get the correct IST date.
// ══════════════════════════════════════════════════
function orderDateToISO(dateStr){
  if(!dateStr && dateStr !== 0) return '';

  // Case 1: actual JS Date object
  if(dateStr instanceof Date){
    const ist=new Date(dateStr.getTime()+5.5*60*60*1000);
    return `${ist.getUTCFullYear()}-${String(ist.getUTCMonth()+1).padStart(2,'0')}-${String(ist.getUTCDate()).padStart(2,'0')}`;
  }

  const s=String(dateStr).trim();

  // Case 4: already YYYY-MM-DD — passthrough
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // Case 2: ISO datetime string e.g. "2026-04-03T18:30:00.000Z" or "2026-04-03T00:00:00.000Z"
  // Apply +5:30 IST offset to get correct local date
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const ist=new Date(new Date(s).getTime()+5.5*60*60*1000);
    if(!isNaN(ist.getTime()))
      return `${ist.getUTCFullYear()}-${String(ist.getUTCMonth()+1).padStart(2,'0')}-${String(ist.getUTCDate()).padStart(2,'0')}`;
  }

  // Case 3: DD/MM/YYYY or D/M/YYYY (en-IN locale string stored as text)
  const parts=s.split('/');
  if(parts.length===3){
    const dd=parts[0].padStart(2,'0');
    const mm=parts[1].padStart(2,'0');
    const yyyy=parts[2].trim();
    if(yyyy.length===4) return `${yyyy}-${mm}-${dd}`;
  }

  return '';
}

// ══════════════════════════════════════════════════
// APPLY FILTERS — two-level: date + slot + status
// All three filters work together (AND logic)
// ══════════════════════════════════════════════════
function applyFilters(){
  const dateVal=doc('filter-date').value;    // YYYY-MM-DD or empty
  const typeVal=doc('filter-type').value;    // all | day | night
  const stVal  =doc('filter-status').value;  // all | active | pending | preparing | out for delivery | delivered

  _filteredOrders=_orders.filter(o=>{
    // ── Level 1: Date filter ──
    if(dateVal){
      const oISO=orderDateToISO(o.date);
      if(oISO!==dateVal) return false;
    }
    // ── Level 2a: Day/Night slot filter ──
    if(typeVal!=='all'){
      const dayOrder=isDayOrder(o);
      if(typeVal==='day'  && !dayOrder) return false;
      if(typeVal==='night' && dayOrder) return false;
    }
    // ── Level 2b: Status filter ──
    if(stVal==='active'){
      if(o.orderStatus==='delivered') return false;
    } else if(stVal!=='all'){
      if(o.orderStatus!==stVal) return false;
    }
    return true;
  });

  updateStats();
  renderActiveFilterTags(dateVal, typeVal, stVal);
  renderOrders();
}

function clearDate(){
  doc('filter-date').value='';
  applyFilters();
}

function resetFilters(){
  doc('filter-date').value='';
  doc('filter-type').value='all';
  doc('filter-status').value='all';
  _filteredOrders=[..._orders];
  updateStats();
  renderActiveFilterTags('','all','all');
  renderOrders();
}

// ── Show active filter summary tags ──
function renderActiveFilterTags(dateVal, typeVal, stVal){
  const tags=[];
  if(dateVal) tags.push(`📅 ${dateVal}`);
  if(typeVal!=='all') tags.push(typeVal==='day'?'☀️ Day Orders':'🌙 Night Orders');
  if(stVal!=='all') tags.push(`Status: ${stVal}`);

  const el=doc('active-filter-tags');
  if(!tags.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="active-filter-tag">🔍 Filtering: <span>${tags.join(' &amp; ')}</span> · ${_filteredOrders.length} order${_filteredOrders.length!==1?'s':''} shown</div>`;
}

// ── Display helpers: format date/time for rendering ──
// Handles: JS Date object, ISO datetime string, DD/MM/YYYY string
function fmtDate(v){
  if(!v && v!==0) return '';
  const parseIST=(raw)=>{
    const ist=new Date(new Date(raw).getTime()+5.5*60*60*1000);
    if(isNaN(ist.getTime())) return null;
    return String(ist.getUTCDate()).padStart(2,'0')+'/'+String(ist.getUTCMonth()+1).padStart(2,'0')+'/'+ist.getUTCFullYear();
  };
  if(v instanceof Date) return parseIST(v)||String(v);
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)||/^\d{4}-\d{2}-\d{2}$/.test(s)){
    return parseIST(s)||s;
  }
  return s; // already "DD/MM/YYYY" string
}
function fmtTime(v){
  if(!v && v!==0) return '';
  const parseIST=(raw)=>{
    const ist=new Date(new Date(raw).getTime()+5.5*60*60*1000);
    if(isNaN(ist.getTime())) return null;
    let h=ist.getUTCHours(), mn=ist.getUTCMinutes();
    const p=h>=12?'PM':'AM'; h=h%12||12;
    return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0')+' '+p;
  };
  if(v instanceof Date) return parseIST(v)||String(v);
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)) return parseIST(s)||s;
  return s.replace(/[\u00a0\u202f\u2009]/g,' '); // plain "HH:MM am/pm" string
}

// ── Stats always show totals for all loaded orders ──

  doc('s-total').textContent=_orders.length;

// ── UPDATE STATUS ──
async function updateStatus(orderId,filtIdx,globalIdx){
  const status=doc('sel-'+filtIdx).value;
  try{
    await api('updateOrderStatus',{orderId,status,riderId:_rider.riderId});
    toast('✅ Status updated!');
    if(globalIdx>=0){ _orders[globalIdx].orderStatus=status; _orders[globalIdx].riderId=_rider.riderId; }
    if(_filteredOrders[filtIdx]){ _filteredOrders[filtIdx].orderStatus=status; _filteredOrders[filtIdx].riderId=_rider.riderId; }
    updateStats(); renderOrders();
  }catch(e){ toast('❌ '+e.message); }
}

// ── UTILS ──
function doc(id){ return document.getElementById(id); }
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const t=doc('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),3000); }
function safeP(v){ if(Array.isArray(v)) return v; if(typeof v==='object'&&v!==null) return v; if(!v||typeof v!=='string') return []; try{ return JSON.parse(v); }catch{ return []; } }
